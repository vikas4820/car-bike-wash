<main class="dashboard-content"><section class="page-head"><div><span>Appointment request</span><h1>Book a service</h1><p>Select a saved vehicle, service and preferred doorstep slot.</p></div></section><section class="panel form-panel"><form [formGroup]="form" (ngSubmit)="submit()" novalidate><div class="form-section"><h3>Service details</h3><div class="dashboard-form-grid"><div class="dashboard-field"><label>Vehicle</label><select class="form-select" formControlName="vehicleId"><option value="">Choose vehicle</option>@for (vehicle of vehicles(); track vehicle.id) { <option [value]="vehicle.id">{{ vehicle.make }} {{ vehicle.model }} · {{ vehicle.registrationNumber }}</option> }</select><app-form-error [control]="form.controls.vehicleId" label="Vehicle" /></div><div class="dashboard-field"><label>Service</label><select class="form-select" formControlName="serviceId"><option value="">Choose service</option>@for (service of services(); track service.id) { <option [value]="service.id">{{ service.name }} · ₹{{ service.carPrice }}</option> }</select><app-form-error [control]="form.controls.serviceId" label="Service" /></div><div class="dashboard-field"><label>Preferred date</label><input class="form-control" type="date" [min]="minDate" formControlName="date"><app-form-error [control]="form.controls.date" label="Date" /></div><div class="dashboard-field"><label>Preferred time</label><select class="form-select" formControlName="time"><option value="">Choose a slot</option><option>8:00 AM – 10:00 AM</option><option>10:00 AM – 12:00 PM</option><option>12:00 PM – 2:00 PM</option><option>2:00 PM – 4:00 PM</option><option>4:00 PM – 6:00 PM</option><option>6:00 PM – 8:00 PM</option></select><app-form-error [control]="form.controls.time" label="Time" /></div></div></div><div class="form-section"><h3>Location and notes</h3><div class="dashboard-form-grid"><div class="dashboard-field full"><label>Service address</label><textarea class="form-control" formControlName="address" placeholder="House number, area and landmark"></textarea><app-form-error [control]="form.controls.address" label="Address" /></div><div class="dashboard-field"><label>Payment preference</label><select class="form-select" formControlName="paymentMethod"><option>Pay after service</option><option>UPI</option><option>Card</option></select></div><div class="dashboard-field"><label>Notes</label><input class="form-control" formControlName="notes" placeholder="Parking access, vehicle condition, etc."></div></div></div><div class="form-actions"><button class="secondary-action" type="button" (click)="form.reset({ paymentMethod: 'Pay after service' })">Clear</button><button class="primary-action" type="submit" [disabled]="submitting()">@if (submitting()) { <i class="fa-solid fa-spinner fa-spin"></i> Creating... } @else { Confirm booking <i class="fa-solid fa-arrow-right"></i> }</button></div></form></section></main>
