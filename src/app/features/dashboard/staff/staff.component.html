<main class="dashboard-content"><section class="page-head"><div><span>Workforce</span><h1>Staff</h1><p>Technicians, workload, availability and performance.</p></div><button class="primary-action" (click)="showForm.set(!showForm())"><i class="fa-solid fa-user-plus"></i> Add staff</button></section>@if (showForm()) { <section class="panel form-panel"><form [formGroup]="form" (ngSubmit)="save()"><div class="dashboard-form-grid"><div class="dashboard-field"><label>Name</label><input class="form-control" formControlName="name"></div><div class="dashboard-field"><label>Role</label><input class="form-control" formControlName="role" placeholder="Detailing Technician"></div><div class="dashboard-field"><label>Email</label><input class="form-control" formControlName="email"></div><div class="dashboard-field"><label>Phone</label><input class="form-control" formControlName="phone"></div><div class="dashboard-field"><label>Status</label><select class="form-select" formControlName="status"><option>Active</option><option>On leave</option><option>Inactive</option></select></div></div><div class="form-actions"><button class="secondary-action" type="button" (click)="showForm.set(false)">Cancel</button><button class="primary-action">Add member</button></div></form></section> }<section class="card-grid">@for (item of staff(); track item.id) { <article class="item-card"><span class="item-icon"><i class="fa-solid fa-user-gear"></i></span><span class="status" [class.active]="item.status === 'Active'" [class.pending]="item.status === 'On leave'" [class.inactive]="item.status === 'Inactive'">{{ item.status }}</span><h3>{{ item.name }}</h3><p>{{ item.role }}</p><p>{{ item.email }} · {{ item.phone }}</p><div class="stats-inline"><span>Rating <strong>{{ item.rating }}</strong></span><span>Jobs today <strong>{{ item.jobsToday }}</strong></span></div><div class="item-card-actions"><button><i class="fa-regular fa-calendar"></i> Schedule</button><button><i class="fa-regular fa-pen-to-square"></i> Edit</button></div></article> }</section></main>
