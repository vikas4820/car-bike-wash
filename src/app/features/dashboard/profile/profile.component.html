<main class="dashboard-content"><section class="page-head"><div><span>Account</span><h1>Profile settings</h1><p>Keep contact and service-address information accurate.</p></div></section><section class="split-layout"><article class="panel profile-panel"><div class="profile-avatar">{{ auth.currentUser()?.name?.charAt(0) }}</div><h3>{{ auth.currentUser()?.name }}</h3><p>{{ auth.currentUser()?.email }}</p><p>Customer account</p><button class="secondary-action" type="button"><i class="fa-solid fa-camera"></i> Change photo</button></article><article class="panel form-panel"><form [formGroup]="form" (ngSubmit)="submit()"><div class="dashboard-form-grid"><div class="dashboard-field"><label>Full name</label><input class="form-control" formControlName="name"><app-form-error [control]="form.controls.name" label="Name" /></div><div class="dashboard-field"><label>Email</label><input class="form-control" type="email" formControlName="email"><app-form-error [control]="form.controls.email" label="Email" /></div><div class="dashboard-field"><label>Phone</label><input class="form-control" formControlName="phone"><app-form-error [control]="form.controls.phone" label="Phone" /></div><div class="dashboard-field"><label>City</label><input class="form-control" formControlName="city"></div><div class="dashboard-field full"><label>Default address</label><input class="form-control" formControlName="address"></div><div class="dashboard-field"><label>Postcode</label><input class="form-control" formControlName="postcode"></div></div><div class="form-actions"><button class="primary-action" [disabled]="submitting()">@if (submitting()) { Saving... } @else { Save changes }</button></div></form></article></section></main>
