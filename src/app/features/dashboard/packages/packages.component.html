<main class="dashboard-content"><section class="page-head"><div><span>Pricing</span><h1>Packages</h1><p>Bundle services into clear customer choices and pricing tiers.</p></div><button class="primary-action" (click)="showForm.set(!showForm())"><i class="fa-solid fa-plus"></i> Add package</button></section>@if (showForm()) { <section class="panel form-panel"><form [formGroup]="form" (ngSubmit)="save()"><div class="dashboard-form-grid"><div class="dashboard-field"><label>Package name</label><input class="form-control" formControlName="name"></div><div class="dashboard-field"><label>Featured</label><select class="form-select" formControlName="featured"><option [ngValue]="false">No</option><option [ngValue]="true">Yes</option></select></div><div class="dashboard-field"><label>Car price</label><input class="form-control" type="number" formControlName="carPrice"></div><div class="dashboard-field"><label>Bike price</label><input class="form-control" type="number" formControlName="bikePrice"></div><div class="dashboard-field full"><label>Description</label><textarea class="form-control" formControlName="description"></textarea></div><div class="dashboard-field full"><label>Features, one per line</label><textarea class="form-control" formControlName="features"></textarea></div></div><div class="form-actions"><button class="secondary-action" type="button" (click)="showForm.set(false)">Cancel</button><button class="primary-action">Save package</button></div></form></section> }<section class="card-grid">@for (item of packages(); track item.id; let index = $index) { <article class="item-card"><span class="item-icon"><i class="fa-solid fa-box-open"></i></span>@if (index === 1) { <span class="status active">Featured</span> }<h3>{{ item.name }}</h3><p>{{ item.description }}</p><div class="stats-inline"><span>Car <strong>₹{{ item.carPrice }}</strong></span><span>Bike <strong>₹{{ item.bikePrice }}</strong></span></div><div class="item-card-actions"><button><i class="fa-regular fa-pen-to-square"></i> Edit</button><button><i class="fa-solid fa-copy"></i> Duplicate</button></div></article> }</section></main>
