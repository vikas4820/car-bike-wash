<main class="dashboard-content"><section class="page-head"><div><span>Help centre</span><h1>Support</h1><p>Contact the service team about a booking, payment or account issue.</p></div></section><section class="split-layout"><article class="panel"><div class="panel-head"><div><small>Quick help</small><h2>Contact options</h2></div></div><div class="card-grid" style="grid-template-columns:1fr"><article class="item-card"><span class="item-icon"><i class="fa-brands fa-whatsapp"></i></span><h3>WhatsApp support</h3><p>Available daily from 8 AM to 10 PM.</p></article><article class="item-card"><span class="item-icon"><i class="fa-solid fa-phone"></i></span><h3>Call us</h3><p>+91 98765 43210</p></article><article class="item-card"><span class="item-icon"><i class="fa-regular fa-envelope"></i></span><h3>Email</h3><p>support@shinecraft.in</p></article></div></article><article class="panel form-panel"><div class="panel-head"><div><small>New request</small><h2>Open a support ticket</h2></div></div><form [formGroup]="form" (ngSubmit)="submit()"><div class="dashboard-form-grid"><div class="dashboard-field"><label>Category</label><select class="form-select" formControlName="category"><option value="">Select category</option><option>Booking</option><option>Payment</option><option>Service quality</option><option>Account</option></select><app-form-error [control]="form.controls.category" label="Category" /></div><div class="dashboard-field"><label>Priority</label><select class="form-select" formControlName="priority"><option>Normal</option><option>High</option><option>Urgent</option></select></div><div class="dashboard-field full"><label>Subject</label><input class="form-control" formControlName="subject"><app-form-error [control]="form.controls.subject" label="Subject" /></div><div class="dashboard-field full"><label>Booking ID, when relevant</label><input class="form-control" formControlName="bookingId" placeholder="SC-2048"></div><div class="dashboard-field full"><label>Message</label><textarea class="form-control" formControlName="message"></textarea><app-form-error [control]="form.controls.message" label="Message" /></div></div><div class="form-actions"><button class="primary-action" [disabled]="submitting()">Submit request</button></div></form></article></section></main>
