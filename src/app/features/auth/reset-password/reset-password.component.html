<div class="auth-page"><aside class="auth-visual"><a routerLink="/" class="auth-brand"><span class="brand-glyph"><i class="fa-solid fa-droplet"></i></span><span class="brand-copy"><strong>SHINECRAFT</strong><small>Auto Spa</small></span></a><div class="auth-visual-copy"><span>Secure reset</span><h1>Choose a stronger password.</h1><p>Use a unique password with uppercase, lowercase, number and symbol.</p></div></aside><main class="auth-panel"><section class="auth-card"><div class="auth-card-top"><a routerLink="/login" class="back-home"><i class="fa-solid fa-arrow-left"></i> Login</a><app-theme-toggle /></div><h2>Set new password</h2><p>Your reset token will be sent to the authentication API.</p>@if (errorMessage()) { <div class="alert-box error">{{ errorMessage() }}</div> }<form [formGroup]="form" (ngSubmit)="submit()"><div class="form-field"><label>New password</label><div class="input-wrap"><i class="fa-solid fa-lock"></i><input class="form-control" [type]="showPassword() ? 'text' : 'password'" formControlName="password"><button class="password-toggle" type="button" (click)="showPassword.set(!showPassword())"><i class="fa-regular fa-eye"></i></button></div><app-form-error [control]="form.controls.password" label="Password" /></div><div class="form-field"><label>Confirm password</label><div class="input-wrap"><i class="fa-solid fa-shield-halved"></i><input class="form-control" [type]="showPassword() ? 'text' : 'password'" formControlName="passwordConfirmation"></div><app-form-error [control]="form.controls.passwordConfirmation" label="Password confirmation" /></div><button class="submit-btn" [disabled]="submitting()">@if (submitting()) { Updating... } @else { Update password <i class="fa-solid fa-arrow-right"></i> }</button></form></section></main></div>
